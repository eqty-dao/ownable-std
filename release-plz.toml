[workspace]
# Only prepare releases when at least one commit message matches these conventional commits.
release_commits = "^(feat|fix)(\\(.+\\))?(!)?:"
# Keep semantic-release-like behavior for feature commits on 0.x versions.
features_always_increment_minor = true
# Release on every run of `release-plz release` (default behavior).
release_always = true
# Allow release workflow to patch Cargo.toml in CI before publishing.
publish_allow_dirty = true

[[package]]
name = "ownable-std"
version_group = "ownable"

[[package]]
name = "ownable-std-macros"
version_group = "ownable"
